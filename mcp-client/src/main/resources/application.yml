spring:
  application:
    name: spring-ai-mcp-client
  profiles:
    active: dev
  ai:
    mcp:
      client:
        enabled: true
        name: spring-ai-mcp-client
        type: ASYNC
        sse:
          connections:
            server1:
              url: https://mcp.amap.com
              sse-endpoint: /sse?key=09557e21174fff33be82c6cf0fa2cbcb
#            server2:
#              url: http://localhost:9060
#              sse-endpoint: /sse
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL}
      chat:
        options:
          model: ${OPENAI_BASE_MODEL}
    vectorstore:
      redis:
        initialize-schema: true
        index-name: lee-vectorstore
        prefix: 'embedding:'
  # ===================== Redis 连接配置 =====================
  data:
    redis:
      host: 127.0.0.1
      port: 9379
      password: 123456
debug: true  # 开启Spring Boot调试模式，会打印自动配置报告
logging:
  level:
    root: info
    # 专门打印自动配置相关日志
    org.springframework.boot.autoconfigure: DEBUG
    org.springframework.ai.mcp: DEBUG  # MCP客户端专属日志
internet:
  websearch:
    searxng:
      url: http://localhost:6080/search
      counts: 10